<!doctype html>
<html>
  <head>
    <title>Digit OCR App</title>
    <style>
      body {
        text-align: center;
        font-family: Arial;
        background-color: #f2f2f2;
      }
      .container {
        margin-top: 50px;
      }
      img {
        margin-top: 20px;
        width: 150px;
      }
      .result {
        font-size: 30px;
        margin-top: 20px;
        color: green;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Handwritten Digit Recognition</h1>

      <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required />
        <br /><br />
        <button type="submit">Predict</button>
      </form>

      {% if image_path %}
      <img src="{{ image_path }}" />
      {% endif %} {% if prediction is not none %}
      <div class="result">Predicted Digit: {{ prediction }}</div>
      {% endif %}
    </div>
  </body>
</html>
